<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Background (land / green) -->
  <rect width="40" height="40" rx="6" fill="#1B5E20"/>

  <!-- Catchment boundary polygon -->
  <polygon
    points="20,3 35,11 38,26 28,37 12,37 2,26 5,11"
    fill="#2E7D32"
    stroke="#A5D6A7"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- Left tributary -->
  <line x1="8"  y1="17" x2="20" y2="26"
        stroke="#42A5F5" stroke-width="2" stroke-linecap="round"/>

  <!-- Right tributary -->
  <line x1="32" y1="17" x2="20" y2="26"
        stroke="#42A5F5" stroke-width="2" stroke-linecap="round"/>

  <!-- Upper-left sub-tributary -->
  <line x1="6"  y1="12" x2="8"  y2="17"
        stroke="#42A5F5" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Upper-right sub-tributary -->
  <line x1="34" y1="12" x2="32" y2="17"
        stroke="#42A5F5" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Main stem to outlet -->
  <line x1="20" y1="26" x2="20" y2="35"
        stroke="#42A5F5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Outlet node -->
  <circle cx="20" cy="36" r="2.8" fill="#1565C0" stroke="white" stroke-width="1.2"/>
</svg>
